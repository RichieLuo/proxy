<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 340px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 13px; background: #fff; color: #333; }
    .header { background: #1a73e8; color: #fff; padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; }
    .header h1 { font-size: 15px; font-weight: 600; }
    .toggle { position: relative; display: inline-block; width: 40px; height: 22px; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: rgba(255,255,255,0.3); border-radius: 22px; transition: .2s; }
    .slider::before { content: ''; position: absolute; height: 16px; width: 16px; left: 3px; bottom: 3px; background: #fff; border-radius: 50%; transition: .2s; }
    input:checked + .slider { background: #4CAF50; }
    input:checked + .slider::before { transform: translateX(18px); }

    .content { padding: 14px 16px; }
    .section { margin-bottom: 14px; }
    .section-label { font-size: 11px; font-weight: 600; color: #666; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }

    select, input[type="text"], input[type="number"] {
      width: 100%; padding: 7px 10px; border: 1px solid #ddd; border-radius: 6px;
      font-size: 13px; outline: none; transition: border-color .2s;
    }
    select:focus, input:focus { border-color: #1a73e8; }

    .proxy-row { display: flex; gap: 8px; }
    .proxy-row select { width: 90px; flex-shrink: 0; }
    .proxy-row input.host { flex: 1; }
    .proxy-row input.port { width: 70px; flex-shrink: 0; }

    .domain-list { max-height: 150px; overflow-y: auto; border: 1px solid #eee; border-radius: 6px; margin-bottom: 8px; }
    .domain-item { display: flex; align-items: center; justify-content: space-between; padding: 7px 10px; border-bottom: 1px solid #f0f0f0; }
    .domain-item:last-child { border-bottom: none; }
    .domain-item .domain-text { font-family: 'SF Mono', 'Menlo', monospace; font-size: 12px; word-break: break-all; }
    .domain-item .remove-btn { background: none; border: none; color: #ccc; cursor: pointer; font-size: 16px; padding: 0 4px; line-height: 1; }
    .domain-item .remove-btn:hover { color: #e53935; }
    .empty-hint { padding: 16px; text-align: center; color: #999; font-size: 12px; }

    .add-row { display: flex; gap: 6px; }
    .add-row input { flex: 1; }
    .add-row button { padding: 7px 14px; background: #1a73e8; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500; white-space: nowrap; }
    .add-row button:hover { background: #1557b0; }

    .status-bar { padding: 8px 16px; background: #f5f5f5; font-size: 11px; color: #888; display: flex; align-items: center; gap: 6px; }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; }
    .status-dot.on { background: #4CAF50; }
    .status-dot.off { background: #ccc; }

    .footer { display: flex; gap: 8px; padding: 8px 16px 14px; }
    .footer button { flex: 1; padding: 8px; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 500; }
    .btn-save { background: #1a73e8; color: #fff; }
    .btn-save:hover { background: #1557b0; }
    .btn-reset { background: #f0f0f0; color: #666; }
    .btn-reset:hover { background: #e0e0e0; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Selective Domain Proxy</h1>
    <label class="toggle" title="Enable/Disable">
      <input type="checkbox" id="toggleEnabled">
      <span class="slider"></span>
    </label>
  </div>

  <div class="content">
    <div class="section">
      <div class="section-label">代理模式</div>
      <select id="modeSelect">
        <option value="url">URL匹配 (Request-host based)</option>
        <option value="tab">标签页匹配 (Tab-domain based)</option>
      </select>
    </div>

    <div class="section">
      <div class="section-label">代理服务器</div>
      <div class="proxy-row">
        <select id="protocolSelect">
          <option value="http">HTTP</option>
          <option value="https">HTTPS</option>
          <option value="socks5">SOCKS5</option>
          <option value="socks4">SOCKS4</option>
        </select>
        <input type="text" id="proxyHost" class="host" placeholder="Host / IP" value="127.0.0.1">
        <input type="number" id="proxyPort" class="port" placeholder="Port" value="8080" min="1" max="65535">
      </div>
    </div>

    <div class="section">
      <div class="section-label">域名白名单</div>
      <div class="domain-list" id="domainList">
        <div class="empty-hint" id="emptyHint">还没有添加域名</div>
      </div>
      <div class="add-row">
        <input type="text" id="newDomain" placeholder="输入域名，如 example.com">
        <button id="addBtn">添加</button>
      </div>
    </div>
  </div>

  <div class="status-bar">
    <span class="status-dot" id="statusDot"></span>
    <span id="statusText">代理已关闭</span>
  </div>

  <div class="footer">
    <button class="btn-reset" id="resetBtn">恢复默认</button>
    <button class="btn-save" id="saveBtn">保存设置</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
